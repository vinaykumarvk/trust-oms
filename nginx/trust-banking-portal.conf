server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api requests to the Trust Banking API service
    location /api/ {
        # Literal URL (substituted by envsubst at container start).
        # nginx strips the /api/ location prefix then appends the remainder to this path,
        # so /api/v1/auth/login → https://host/api/v1/auth/login. No variable needed.
        proxy_pass ${API_BASE_URL}/api/;
        proxy_http_version 1.1;
        # proxy_ssl_server_name is required for TLS SNI so Cloud Run routes to the
        # correct service (HTTPS upstream without SNI returns a TLS handshake error).
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # SPA: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets (hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
