openapi: 3.0.3
info:
  title: TrustOMS Philippines API
  version: 1.0.0
  description: >
    Trust Order Management System — comprehensive API for trust banking operations
    including order lifecycle, trade execution, settlement, compliance, CRM,
    risk profiling, fee management, and client self-service portal.
  contact:
    name: TrustOMS Engineering
servers:
  - url: /api/v1
    description: API v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CookieAuth:
      type: apiKey
      in: cookie
      name: trustoms-access-token
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    DataResponse:
      type: object
      properties:
        data:
          type: object
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 25
    SearchParam:
      name: search
      in: query
      schema:
        type: string

security:
  - BearerAuth: []

tags:
  - name: Health
    description: System health check
  - name: Auth
    description: Authentication (login, refresh, logout, profile)
  - name: Entity Registry
    description: Dynamic entity metadata and field configuration
  - name: Orders
    description: Order lifecycle management
  - name: Trades
    description: Block trading, fills, and execution
  - name: Confirmations
    description: Trade confirmation and matching
  - name: Settlements
    description: Settlement and cash ledger management
  - name: NAV
    description: NAV calculation and fund accounting
  - name: RM Dashboard
    description: Relationship Manager dashboard
  - name: Suitability
    description: Suitability assessment and checks
  - name: Kill Switch
    description: Emergency trading halt controls
  - name: Executive
    description: Executive dashboard and operations control tower
  - name: Notifications
    description: Notification system and preferences
  - name: Whistleblower
    description: Whistleblower reporting and case management
  - name: Scenario
    description: What-if scenario analysis and ESG scoring
  - name: AI
    description: AI suitability engine and intelligent order routing
  - name: Realtime
    description: Real-time subscriptions and collaborative workspace
  - name: Approvals
    description: Maker-checker approval queue
  - name: Audit
    description: Audit trail and compliance logging
  - name: KYC
    description: KYC management and renewal
  - name: EOD
    description: End-of-day processing
  - name: Reconciliation
    description: Reconciliation engine and break management
  - name: Corporate Actions
    description: Corporate action lifecycle and entitlements
  - name: Fees
    description: Fee engine — schedules, accruals, billing, TER
  - name: Tax
    description: Tax engine — WHT, BIR, FATCA, CRS, 1601-FQ
  - name: Surveillance
    description: Trade surveillance, alerts, and fraud detection
  - name: Reversals
    description: Trade and transaction reversals
  - name: Integrations
    description: Integration hub and external connectors
  - name: Transfers
    description: Portfolio transfers (in-kind and cash)
  - name: Contributions
    description: Trust contributions and deposits
  - name: Withdrawals
    description: Trust withdrawals and redemptions
  - name: Compliance Limits
    description: Pre/post-trade compliance limits
  - name: Rebalancing
    description: Portfolio modeling and rebalancing
  - name: Scheduled Plans
    description: EIP, ERP, and standing instruction plans
  - name: PERA
    description: Personal Equity and Retirement Account
  - name: Risk Analytics
    description: VaR, duration, IREP risk analytics
  - name: Compliance
    description: Compliance workbench and rules engine
  - name: ORE
    description: ORE ledger and operational risk events
  - name: Reports
    description: Reports and analytics hub
  - name: Uploads
    description: Bulk upload processing
  - name: GL
    description: Enterprise General Ledger and posting engine
  - name: ECL
    description: Expected Credit Loss computation
  - name: TTRA
    description: Trust and Transfer Agent lifecycle
  - name: Claims
    description: Claims and compensation management
  - name: Risk Profiling
    description: Risk profiling, questionnaires, and assessments
  - name: Proposals
    description: Investment proposal generation and workflow
  - name: Campaigns
    description: Campaign management, lead lists, and dispatch
  - name: Lead Management
    description: Lead lifecycle, conversion, and sub-entities
  - name: Prospect Management
    description: Prospect lifecycle, conversion, and sub-entities
  - name: Negative List
    description: Negative list screening
  - name: HAM
    description: Handover and Assignment Management
  - name: Meetings
    description: CRM meeting management
  - name: Call Reports
    description: CRM call report management
  - name: Opportunities
    description: CRM opportunity pipeline
  - name: CRM Tasks
    description: CRM task management
  - name: CRM Notifications
    description: CRM notification inbox
  - name: CRM Handovers
    description: CRM RM handover requests
  - name: MFA
    description: Multi-factor authentication enrollment
  - name: Consent
    description: Consent and privacy center
  - name: Degraded Mode
    description: Feed health and degraded mode management
  - name: DSAR
    description: Data Subject Access Requests
  - name: Regulatory Calendar
    description: Regulatory filing calendar
  - name: Content Packs
    description: Content pack versioning
  - name: Service Requests
    description: Service request and task management
  - name: Features
    description: Platform feature service integration
  - name: Intelligence
    description: Platform intelligence service (AI copilot)
  - name: System Config
    description: System configuration management
  - name: Client Messages
    description: Back-office client messaging
  - name: Statements
    description: Statement generation and delivery
  - name: Client Portal
    description: Client self-service portal
  - name: CRUD Entities
    description: >
      Standard CRUD endpoints for reference/master data entities.
      Each entity supports: GET / (list), GET /:id, POST /, PUT /:id,
      DELETE /:id (soft), GET /export/csv, POST /check-duplicate, POST /bulk-import.

paths:
  # ===========================================================================
  # Health
  # ===========================================================================
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                  service:
                    type: string

  # ===========================================================================
  # Auth
  # ===========================================================================
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
                      expiresIn:
                        type: integer
        '400':
          description: Missing credentials
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange refresh token for new token pair
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
        '400':
          description: Missing refresh token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      responses:
        '200':
          description: Logged out

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all sessions for current user
      responses:
        '200':
          description: All sessions revoked

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: User profile
        '401':
          description: Not authenticated

  /auth/change-password:
    put:
      tags: [Auth]
      summary: Change password (requires old password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed

  # ===========================================================================
  # Entity Registry
  # ===========================================================================
  /entity-registry:
    get:
      tags: [Entity Registry]
      summary: List all registered entities
      responses:
        '200':
          description: Entity list

  /entity-registry/{entityKey}:
    get:
      tags: [Entity Registry]
      summary: Get entity configuration
      parameters:
        - name: entityKey
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entity config

  /entity-registry/{entityKey}/fields:
    get:
      tags: [Entity Registry]
      summary: Get field configurations for an entity
      parameters:
        - name: entityKey
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Field configs

  # ===========================================================================
  # Orders
  # ===========================================================================
  /orders:
    get:
      tags: [Orders]
      summary: List orders with filters
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SearchParam'
        - name: status
          in: query
          schema:
            type: string
        - name: portfolio_id
          in: query
          schema:
            type: string
        - name: side
          in: query
          schema:
            type: string
        - name: trader_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated order list
    post:
      tags: [Orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Order created

  /orders/auto-compute:
    post:
      tags: [Orders]
      summary: Auto-compute missing order field (quantity/price/amount)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Computed values

  /orders/pending-auth:
    get:
      tags: [Orders]
      summary: Pending authorization queue
      parameters:
        - name: tier
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Pending orders

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get single order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order details
        '404':
          description: Not found
    put:
      tags: [Orders]
      summary: Update draft order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Order updated
    delete:
      tags: [Orders]
      summary: Cancel order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order cancelled

  /orders/{id}/submit:
    post:
      tags: [Orders]
      summary: Submit order for authorization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order submitted

  /orders/{id}/authorize:
    post:
      tags: [Orders]
      summary: Authorize order (requires senior/checker role)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approver_id, decision]
              properties:
                approver_id:
                  type: integer
                approver_role:
                  type: string
                decision:
                  type: string
                  enum: [APPROVED, REJECTED]
                comment:
                  type: string
      responses:
        '200':
          description: Authorization recorded

  /orders/{id}/reject:
    post:
      tags: [Orders]
      summary: Reject order (shortcut)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                approver_id:
                  type: integer
                comment:
                  type: string
      responses:
        '200':
          description: Order rejected

  /orders/{id}/revert:
    post:
      tags: [Orders]
      summary: Revert/un-cancel an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order reverted

  /orders/{id}/timeline:
    get:
      tags: [Orders]
      summary: Order state transition history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Timeline events

  /orders/{id}/authorizations:
    get:
      tags: [Orders]
      summary: Get authorization chain for an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authorization chain

  # ===========================================================================
  # Trades
  # ===========================================================================
  /trades/aggregation-view:
    get:
      tags: [Trades]
      summary: Aggregated trade view
      responses:
        '200':
          description: Aggregation data

  /trades/brokers/compare:
    get:
      tags: [Trades]
      summary: Compare broker execution quality
      responses:
        '200':
          description: Broker comparison

  /trades/blocks:
    get:
      tags: [Trades]
      summary: List trade blocks
      responses:
        '200':
          description: Block list
    post:
      tags: [Trades]
      summary: Create a trade block
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Block created

  /trades/blocks/suggestions:
    get:
      tags: [Trades]
      summary: Get block suggestions for pending orders
      responses:
        '200':
          description: Suggested blocks

  /trades/blocks/{id}:
    get:
      tags: [Trades]
      summary: Get single trade block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Block details

  /trades/blocks/{id}/allocate:
    post:
      tags: [Trades]
      summary: Allocate block to child orders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Allocation complete

  /trades/blocks/{id}/place:
    post:
      tags: [Trades]
      summary: Place block order with broker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Placement sent

  /trades/blocks/{id}/placement:
    delete:
      tags: [Trades]
      summary: Cancel block placement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Placement cancelled

  /trades/blocks/{id}/fills:
    get:
      tags: [Trades]
      summary: Get fills for a block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Fill list

  /trades/fills:
    post:
      tags: [Trades]
      summary: Record a fill/execution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Fill recorded

  /trades/fills/order/{orderId}:
    get:
      tags: [Trades]
      summary: Get fills for a specific order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order fills

  # ===========================================================================
  # Confirmations
  # ===========================================================================
  /confirmations:
    get:
      tags: [Confirmations]
      summary: List confirmations with filters
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Confirmation list

  /confirmations/stats:
    get:
      tags: [Confirmations]
      summary: Confirmation statistics
      responses:
        '200':
          description: Stats summary

  /confirmations/{id}:
    get:
      tags: [Confirmations]
      summary: Get single confirmation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Confirmation details

  /confirmations/{id}/match:
    post:
      tags: [Confirmations]
      summary: Match a confirmation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Matched

  /confirmations/{id}/dispute:
    post:
      tags: [Confirmations]
      summary: Dispute a confirmation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Disputed

  /confirmations/{id}/affirm:
    post:
      tags: [Confirmations]
      summary: Affirm a confirmation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Affirmed

  /confirmations/{id}/cancel:
    post:
      tags: [Confirmations]
      summary: Cancel a confirmation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cancelled

  # ===========================================================================
  # Settlements
  # ===========================================================================
  /settlements:
    get:
      tags: [Settlements]
      summary: List settlements with filters
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            type: string
        - name: portfolio_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Settlement list

  /settlements/summary:
    get:
      tags: [Settlements]
      summary: Settlement summary dashboard
      responses:
        '200':
          description: Summary data

  /settlements/generate:
    post:
      tags: [Settlements]
      summary: Generate settlement instructions from confirmed trades
      responses:
        '201':
          description: Instructions generated

  /settlements/cash-ledger:
    get:
      tags: [Settlements]
      summary: Cash ledger entries
      parameters:
        - name: portfolio_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Ledger entries

  /settlements/cash-ledger/summary:
    get:
      tags: [Settlements]
      summary: Cash ledger summary by portfolio
      responses:
        '200':
          description: Cash summary

  /settlements/{id}/settle:
    post:
      tags: [Settlements]
      summary: Mark settlement as settled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Settlement settled

  /settlements/{id}/fail:
    post:
      tags: [Settlements]
      summary: Mark settlement as failed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Settlement failed

  /settlements/net:
    post:
      tags: [Settlements]
      summary: Net settlements by counterparty/currency/date
      responses:
        '200':
          description: Netting results

  /settlements/unified-calc:
    post:
      tags: [Settlements]
      summary: Unified settlement calculator with fee schedules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Calculated settlement

  # ===========================================================================
  # NAV
  # ===========================================================================
  /nav/prices:
    get:
      tags: [NAV]
      summary: List security prices
      responses:
        '200':
          description: Price list

  /nav/prices/upload:
    post:
      tags: [NAV]
      summary: Upload prices from market feed
      responses:
        '201':
          description: Prices uploaded

  /nav/valuations/run:
    post:
      tags: [NAV]
      summary: Run portfolio valuation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                portfolioId:
                  type: string
                date:
                  type: string
                  format: date
      responses:
        '201':
          description: Valuation computed

  /nav/calculate:
    post:
      tags: [NAV]
      summary: Calculate NAV for a fund portfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                portfolioId:
                  type: string
                date:
                  type: string
                  format: date
      responses:
        '201':
          description: NAV calculated

  /nav/performance:
    post:
      tags: [NAV]
      summary: Calculate portfolio performance (TWR/MWR/Sharpe)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                portfolioId:
                  type: string
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        '200':
          description: Performance metrics

  /nav/history:
    get:
      tags: [NAV]
      summary: NAV history for a portfolio
      parameters:
        - name: portfolioId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: NAV history

  /nav/benchmark:
    post:
      tags: [NAV]
      summary: Compare portfolio performance against benchmark
      responses:
        '200':
          description: Benchmark comparison

  /nav/attribution:
    post:
      tags: [NAV]
      summary: Performance attribution analysis
      responses:
        '200':
          description: Attribution results

  # ===========================================================================
  # RM Dashboard
  # ===========================================================================
  /rm-dashboard/summary:
    get:
      tags: [RM Dashboard]
      summary: RM dashboard summary
      parameters:
        - name: rmId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Dashboard summary

  /rm-dashboard/aum-breakdown:
    get:
      tags: [RM Dashboard]
      summary: AUM breakdown by asset class
      responses:
        '200':
          description: AUM breakdown

  /rm-dashboard/pipeline:
    get:
      tags: [RM Dashboard]
      summary: Order pipeline overview
      responses:
        '200':
          description: Pipeline data

  /rm-dashboard/alerts:
    get:
      tags: [RM Dashboard]
      summary: RM alerts and notifications
      responses:
        '200':
          description: Alert list

  /rm-dashboard/pending-tasks:
    get:
      tags: [RM Dashboard]
      summary: Pending tasks for RM
      responses:
        '200':
          description: Task list

  # ===========================================================================
  # Suitability
  # ===========================================================================
  /suitability/{clientId}/capture:
    post:
      tags: [Suitability]
      summary: Capture suitability questionnaire responses
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Responses captured

  /suitability/{clientId}/current:
    get:
      tags: [Suitability]
      summary: Get current suitability profile
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current profile

  /suitability/{clientId}/history:
    get:
      tags: [Suitability]
      summary: Suitability assessment history
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Assessment history

  /suitability/check-order/{orderId}:
    post:
      tags: [Suitability]
      summary: Run suitability check on an order
      parameters:
        - name: orderId
          in: path
          required: true
