                consent_type:
                  type: string
                  enum: [MARKETING_EMAIL, MARKETING_SMS, MARKETING_PUSH, ANALYTICS]
                consent_status:
                  type: string
                  enum: [OPTED_IN, OPTED_OUT, PENDING]
      responses:
        '200':
          description: Updated

  /client-portal/consent/opt-out:
    post:
      tags: [Client Portal]
      summary: Quick opt-out from consent type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [consent_type]
              properties:
                consent_type:
                  type: string
      responses:
        '200':
          description: Opted out

  /client-portal/messages:
    get:
      tags: [Client Portal]
      summary: Client message inbox
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Message list
    post:
      tags: [Client Portal]
      summary: Send message to RM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  type: string
                body:
                  type: string
                thread_id:
                  type: string
      responses:
        '201':
          description: Message sent

  /client-portal/messages/unread-count:
    get:
      tags: [Client Portal]
      summary: Unread message count
      responses:
        '200':
          description: Count

  /client-portal/messages/{id}/read:
    patch:
      tags: [Client Portal]
      summary: Mark message as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Marked read

